# airlock — run the worker runtime + optional dashboard with only Docker installed.
#
#   docker compose up --build
#     worker     -> http://localhost:3000  (/healthz, /console, /v1/chat/completions, /metrics)
#     dashboard  -> http://localhost:8787  (optional; GitHub login needs the OAuth env vars)
#
# Every toolchain (python, node, pnpm, the C++ build for better-sqlite3) runs inside
# the image builds — nothing is installed on the host.

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: airlock-worker:local
    ports:
      - "3000:3000"
    environment:
      AIRLOCK_LOG_LEVEL: ${AIRLOCK_LOG_LEVEL:-INFO}
      # Secret for the live-demo's signed webhook trigger (epic 11).
      HOOK_SECRET: ${HOOK_SECRET:-topsecret}
      # Passthrough for non-stub workers that call a real model endpoint:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
    volumes:
      # Persist the worker's SQLite state (sessions, run traces, tool-result cache).
      - worker-state:/app/worker/.airlock
      # To run YOUR worker instead of the bundled live-demo, mount its dir here:
      # - ./path/to/your/worker:/app/worker
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    image: airlock-dashboard:local
    ports:
      - "8787:8787"
    environment:
      DB_PATH: /data/airlock.db
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8787}
      # Optional — only needed for GitHub login; the dashboard + /healthz serve without them:
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    volumes:
      - dashboard-data:/data
    restart: unless-stopped

  # --- Epic 03 (real model calls + mid-run routing/fallback) --------------------
  # Off by default. Start with:  docker compose --profile epic03 up -d
  # Both reuse the worker image (the live-demo files are baked in); the mock model
  # echoes the binding name so you can SEE which model answered.

  # Deterministic OpenAI-compatible mock model, reachable on the compose network.
  mock-model:
    image: airlock-worker:local
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["epic03"]
    entrypoint: ["python", "model.py", "--port", "8999"]
    # The worker image's HEALTHCHECK probes :3000/healthz, but this service serves the
    # mock model on :8999 — override so the container reports its real health.
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8999), 2).close()"]
      interval: 15s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # The same runtime, but driving the `openai` harness against the mock model.
  # Rewrites the demo's openai manifest to point at the `mock-model` service.
  worker-openai:
    image: airlock-worker:local
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["epic03"]
    depends_on: [mock-model]
    ports:
      - "3001:3000"
    entrypoint:
      - sh
      - -c
      - "sed 's#127.0.0.1#mock-model#g' worker.openai.yaml > worker.yaml && exec python -m airlock_agent"
    restart: unless-stopped

volumes:
  worker-state:
  dashboard-data:
